<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      padding: 14px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1f2329;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #aaa; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      min-height: 18px;
      word-break: break-all;
    }
    #status.ok  { color: #2e7d32; }
    #status.err { color: #c62828; }
  </style>
</head>
<body>
  <h1>📎 Web Clip</h1>
  <button id="clip">剪藏当前页面</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
